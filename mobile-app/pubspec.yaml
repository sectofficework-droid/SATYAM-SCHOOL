name: satyam_school
description: Satyam Stars International School — Teacher & Student App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Supabase
  supabase_flutter: ^2.5.6

  # UI
  flutter_svg: ^2.0.10+1
shimmer: ^3.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
